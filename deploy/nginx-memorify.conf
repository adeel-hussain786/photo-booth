# Nginx site config for memorify.ca on a single VPS.
# Serves the React build as static files and forwards API calls to the
# Node backend running on localhost:5000.
#
# Install location on the server: /etc/nginx/sites-available/memorify
# (see the deployment steps for how to enable it).

server {
    listen 80;
    server_name memorify.ca www.memorify.ca;

    # Allow large photo uploads (matches the 50MB-per-file backend limit).
    client_max_body_size 60M;

    # ── React frontend (static build) ──
    root /var/www/memorify/dist;
    index index.html;

    location / {
        # SPA fallback: any unknown path serves index.html so /g/... and
        # /admin/... work on direct visit and refresh.
        try_files $uri $uri/ /index.html;
    }

    # ── Node backend (reverse proxy) ──
    location /api/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Contact form + health check also live on the backend.
    location = /send   { proxy_pass http://127.0.0.1:5000; }
    location = /health { proxy_pass http://127.0.0.1:5000; }
}
